<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Subtle grid noise overlay via pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- App icon -->
  <rect x="80" y="200" width="96" height="96" rx="21" fill="#161616"/>
  <rect x="96" y="228" width="18" height="7" rx="3.5" fill="white"/>
  <rect x="96" y="242" width="18" height="7" rx="3.5" fill="white" opacity="0.55"/>
  <rect x="96" y="256" width="18" height="7" rx="3.5" fill="white" opacity="0.25"/>
  <text x="118" y="273" font-family="monospace" font-size="34" font-weight="600" fill="white">md</text>

  <!-- Product name -->
  <text x="80" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="72" font-weight="300" letter-spacing="-2" fill="white">show</text>
  <text x="267" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="72" font-weight="300" letter-spacing="-2" fill="rgba(255,255,255,0.35)">.</text>
  <text x="289" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="72" font-weight="300" letter-spacing="-2" fill="white">md</text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.45)">The most readable way to preview any .md file on macOS.</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1120" y2="440" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Pills -->
  <rect x="80" y="464" width="100" height="32" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="130" y="484" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">free</text>

  <rect x="192" y="464" width="130" height="32" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="257" y="484" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">open source</text>

  <rect x="334" y="464" width="110" height="32" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="389" y="484" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">macOS 13+</text>

  <rect x="456" y="464" width="110" height="32" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="511" y="484" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">no account</text>
</svg>
