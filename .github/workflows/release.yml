name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: showmd
  SCHEME: ShowMd

jobs:
  build-and-release:
    name: Build, Notarize & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: cd MarkdownRenderer && swift test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: |
          xcodebuild build \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/$APP_NAME.app"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" "build/$APP_NAME-notarize.zip"
          xcrun notarytool submit "build/$APP_NAME-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/DerivedData/Build/Products/Release/$APP_NAME.app"

          # DMG
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "build/$APP_NAME-$VERSION.dmg"

          # Zip (for Homebrew)
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_NAME.app" "../../../$APP_NAME-$VERSION.zip"
          cd -

          SHA256_ZIP=$(shasum -a 256 "build/$APP_NAME-$VERSION.zip" | awk '{print $1}')
          echo "$SHA256_ZIP  $APP_NAME-$VERSION.zip" > "build/$APP_NAME-$VERSION.zip.sha256"
          echo "sha256=$SHA256_ZIP" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            "build/$APP_NAME-$VERSION.dmg" \
            "build/$APP_NAME-$VERSION.zip" \
            "build/$APP_NAME-$VERSION.zip.sha256" \
            --title "showmd v$VERSION" \
            --generate-notes
