name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: showmd
  SCHEME: ShowMd

jobs:
  build-and-release:
    name: Build, Notarize & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: cd MarkdownRenderer && swift test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/$APP_NAME.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic

      - name: Export
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/$APP_NAME.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/export/$APP_NAME.app" "build/$APP_NAME-notarize.zip"
          xcrun notarytool submit "build/$APP_NAME-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "build/export/$APP_NAME.app"

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd build/export
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_NAME.app" "../$APP_NAME-$VERSION.zip"
          cd ..
          SHA256=$(shasum -a 256 "$APP_NAME-$VERSION.zip" | awk '{print $1}')
          echo "$SHA256  $APP_NAME-$VERSION.zip" > "$APP_NAME-$VERSION.zip.sha256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "zip=build/$APP_NAME-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            "build/$APP_NAME-$VERSION.zip" \
            "build/$APP_NAME-$VERSION.zip.sha256" \
            --title "showmd v$VERSION" \
            --generate-notes
